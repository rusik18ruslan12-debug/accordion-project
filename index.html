<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аккордеон</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accordion-container">
        <div class="accordion-item">
            <input type="radio" name="accordion" id="item1" class="accordion-input" checked>
            <label for="item1" class="accordion-header">
                <span class="accordion-title">Заголовок 1</span>
                <img src="preview1.jpg" alt="Превью 1" class="preview-img">
                <div class="toggle-icon">−</div>
            </label>
            <div class="accordion-content">
                <img src="full1.jpg" alt="Полное изображение 1" class="full-img">
                <p>Описание изображения 1. Здесь может быть много текста, и аккордеон корректно его отобразит без обрезки.</p>
            </div>
        </div>

        <div class="accordion-item">
            <input type="radio" name="accordion" id="item2" class="accordion-input">
            <label for="item2" class="accordion-header">
                <span class="accordion-title">Заголовок 2</span>
                <img src="preview2.jpg" alt="Превью 2" class="preview-img">
                <div class="toggle-icon">+</div>
            </label>
            <div class="accordion-content">
                <img src="full2.jpg" alt="Полное изображение 2" class="full-img">
                <p>Описание изображения 2. При открытии этого элемента предыдущий автоматически закроется.</p>
            </div>
        </div>

        <div class="accordion-item">
            <input type="radio" name="accordion" id="item3" class="accordion-input">
            <label for="item3" class="accordion-header">
                <span class="accordion-title">Заголовок 3</span>
                <img src="preview3.jpg" alt="Превью 3" class="preview-img">
                <div class="toggle-icon">+</div>
            </label>
            <div class="accordion-content">
                <img src="full3.jpg" alt="Полное изображение 3" class="full-img">
                <p>Описание изображения 3. Все элементы работают чисто на CSS без JavaScript.</p>
            </div>
        </div>
    </div>
</body>
</html>
