<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аккордеон</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accordion-container">
        <div class="accordion-item active">
            <div class="accordion-header">
                <span class="accordion-title">Горы</span>
                <img src="images/Gori.jpg" alt="Превью 1" class="preview-img">
                <div class="toggle-icon">+</div>
            </div>
            <div class="accordion-content">
                <img src="images/Gori.jpg" alt="Полное изображение 1" class="full-img">
                <p>Горы ГОры.</p>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                <span class="accordion-title">Море</span>
                <img src="images/More.jpg" alt="Превью 2" class="preview-img">
                <div class="toggle-icon">+</div>
            </div>
            <div class="accordion-content">
                <img src="images/More.jpg" alt="Полное изображение 2" class="full-img">
                <p>Море море.</p>
            </div>
        </div>

        <div class="accordion-item">
            <div class="accordion-header">
                <span class="accordion-title">Лес</span>
                <img src="images/Les.jpg" alt="Превью 3" class="preview-img">
                <div class="toggle-icon">+</div>
            </div>
            <div class="accordion-content">
                <img src="images/Les.jpg" alt="Полное изображение 3" class="full-img">
                <p>Les LEs.</p>
            </div>
        </div>
    </div>
</body>
</html>
